<!doctype html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>chaos.timer</title>
        <link rel="stylesheet" href="popup.css">
    </head>
    <div class="header">
        
        <div class="logo">chaos<span>.</span>timer</div>
        <div class="status-pill">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">IDLE</span>
        </div>
    </div>

    <div class="ring-wrap">
        <svg class="ring-svg" viewBox="0 0 140 140">
            <circle class="ring-track" cx="70" cy="70" r="58"/>
            <circle class="ring-fill idle" id="ringFill" cx="70" cy="70" r="58"
            stroke-dasharray="364.4"
            stroke-dashoffset="364.4"
            />
        </svg>
    <div class="ring-center">
        <div class="ring-time idle" id="ringTime">——</div>
        <div class="ring-label" id="ringLabel">set time</div>
    </div>
    </div>

    <div class="input-row">
        <input class="time-input" id="inputMM" type="number" min="0" max="99" value="25" placeholder="mm"/>
        <div class="time-sep">:</div>
        <input class="time-input" id="inputSS" type="number" min="0" max="59" value="00" placeholder="ss"/>
    </div>
    <div class="input-hint">mm : ss</div>

    <button class="main-btn start" id="mainBtn">Start Session</button>

    <div class="divider"></div>
    <button class="manage-btn" id="manageBtn">manage sites</button>
    <div class="footer">no excuses. no escape.</div>
    <script src="popup.js"></script>
    </body>
</html>
